<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Машины предприятия</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Машины предприятия</h1>
        <a class="btn btn-outline-secondary btn-sm" href="/view/enterprises">Назад к предприятиям</a>
    </div>

    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
    <div id="emptyMessage" class="alert alert-info d-none" role="alert">Нет машин для отображения.</div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Пробег</th>
                        <th scope="col">Цена</th>
                        <th scope="col">Страна</th>
                        <th scope="col">Бренд</th>
                        <th scope="col">Активный водитель</th>
                    </tr>
                    </thead>
                    <tbody id="vehicleTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <button id="prevPage" class="btn btn-outline-primary btn-sm" type="button">Назад</button>
        <div id="pageInfo" class="text-muted"></div>
        <button id="nextPage" class="btn btn-outline-primary btn-sm" type="button">Вперёд</button>
    </div>
</div>

<script>
    const errorMessage = document.getElementById("errorMessage");
    const emptyMessage = document.getElementById("emptyMessage");
    const tableBody = document.getElementById("vehicleTableBody");
    const prevButton = document.getElementById("prevPage");
    const nextButton = document.getElementById("nextPage");
    const pageInfo = document.getElementById("pageInfo");

    const pageSize = 20;
    let currentPage = 0;
    let totalPages = 0;

    const showError = (message) => {
        errorMessage.textContent = message;
        errorMessage.classList.remove("d-none");
    };

    const showEmpty = () => {
        emptyMessage.classList.remove("d-none");
    };

    const clearMessages = () => {
        errorMessage.textContent = "";
        errorMessage.classList.add("d-none");
        emptyMessage.classList.add("d-none");
    };

    const clearTable = () => {
        tableBody.innerHTML = "";
    };

    const updatePagination = () => {
        const totalLabel = totalPages === 0 ? 0 : totalPages;
        const currentLabel = totalPages === 0 ? 0 : currentPage + 1;
        pageInfo.textContent = "Страница " + currentLabel + " из " + totalLabel;

        prevButton.disabled = currentPage <= 0;
        nextButton.disabled = totalPages === 0 || currentPage >= totalPages - 1;
    };

    const renderRow = (vehicle) => {
        const row = document.createElement("tr");

        const idCell = document.createElement("td");
        idCell.textContent = vehicle.id || "-";

        const mileageCell = document.createElement("td");
        mileageCell.textContent = vehicle.milleage ?? "-";

        const priceCell = document.createElement("td");
        priceCell.textContent = vehicle.price ?? "-";

        const countryCell = document.createElement("td");
        countryCell.textContent = vehicle.country || "-";

        const brandCell = document.createElement("td");
        brandCell.textContent = vehicle.brandId || "-";

        const driverCell = document.createElement("td");
        driverCell.textContent = vehicle.activeDriverId || "-";

        row.appendChild(idCell);
        row.appendChild(mileageCell);
        row.appendChild(priceCell);
        row.appendChild(countryCell);
        row.appendChild(brandCell);
        row.appendChild(driverCell);

        tableBody.appendChild(row);
    };

    const loadVehicles = async (enterpriseId, page) => {
        clearMessages();
        clearTable();

        const accessToken = localStorage.getItem("accessToken");

        if (!accessToken) {
            showError("Нет токена доступа. Войдите заново.");
            return;
        }

        const response = await fetch("/api/vehicles?page=" + page + "&size=" + pageSize + "&enterpriseId=" + enterpriseId, {
            headers: {
                "Authorization": "Bearer " + accessToken
            }
        });

        if (!response.ok) {
            showError("Не удалось получить список машин.");
            return;
        }

        const data = await response.json();

        if (!data || !Array.isArray(data.content)) {
            showError("Некорректный ответ сервера.");
            return;
        }

        totalPages = data.totalPages ?? 0;
        currentPage = data.number ?? page;

        if (totalPages > 0 && currentPage >= totalPages) {
            const lastPage = totalPages - 1;
            updateUrl(enterpriseId, lastPage);
            loadVehicles(enterpriseId, lastPage);
            return;
        }

        if (data.totalElements === 0) {
            showEmpty();
            updatePagination();
            return;
        }

        data.content.forEach(renderRow);
        updatePagination();
    };

    const updateUrl = (enterpriseId, page) => {
        const url = new URL(window.location.href);
        url.searchParams.set("enterpriseId", enterpriseId);
        url.searchParams.set("page", page);
        history.replaceState(null, "", url);
    };

    const params = new URLSearchParams(window.location.search);
    const enterpriseId = params.get("enterpriseId");
    const pageParam = parseInt(params.get("page"), 10);
    const initialPage = Number.isNaN(pageParam) || pageParam < 0 ? 0 : pageParam;

    if (!enterpriseId) {
        showError("Не указан идентификатор предприятия.");
    } else {
        updateUrl(enterpriseId, initialPage);
        loadVehicles(enterpriseId, initialPage);
    }

    prevButton.addEventListener("click", () => {
        if (currentPage > 0) {
            const nextPage = currentPage - 1;
            updateUrl(enterpriseId, nextPage);
            loadVehicles(enterpriseId, nextPage);
        }
    });

    nextButton.addEventListener("click", () => {
        if (currentPage + 1 < totalPages) {
            const nextPage = currentPage + 1;
            updateUrl(enterpriseId, nextPage);
            loadVehicles(enterpriseId, nextPage);
        }
    });
</script>
</body>
</html>
