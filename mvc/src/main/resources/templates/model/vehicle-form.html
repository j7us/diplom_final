<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Автомобиль</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 32px;
        }
        form {
            max-width: 520px;
        }
        label {
            display: block;
            margin-top: 12px;
        }
        input, select, button {
            margin-top: 6px;
            padding: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .actions {
            margin-top: 16px;
        }
    </style>
</head>
<body>
<h1 th:text="${title}">Автомобиль</h1>
<form th:action="${action}" th:object="${vehicle}" method="post">
    <label for="milleage">Пробег</label>
    <input id="milleage" type="number" th:field="*{milleage}">

    <label for="price">Цена</label>
    <input id="price" type="number" step="0.01" th:field="*{price}">

    <label for="country">Страна</label>
    <input id="country" type="text" th:field="*{country}">

    <label for="brandId">Бренд</label>
    <select id="brandId" th:field="*{brandId}">
        <option value=""></option>
        <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
    </select>

    <div class="actions">
        <button type="submit" th:text="${submitLabel}">Сохранить</button>
    </div>
</form>
<div class="actions">
    <a th:href="@{/view/vehicles}">Назад</a>
</div>
</body>
</html>
