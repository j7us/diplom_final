<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход менеджера</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h4 mb-3 text-center">Вход менеджера</h1>
                    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" class="form-control" id="username" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");

    const showError = (message) => {
        errorMessage.textContent = message;
        errorMessage.classList.remove("d-none");
    };

    const clearError = () => {
        errorMessage.textContent = "";
        errorMessage.classList.add("d-none");
    };

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        clearError();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
            showError("Заполните логин и пароль.");
            return;
        }

        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        if (!response.ok) {
            showError("Неверный логин или пароль.");
            return;
        }

        const data = await response.json();

        if (!data || !data.accessToken || !data.refreshToken) {
            showError("Не удалось получить токены.");
            return;
        }

        localStorage.setItem("accessToken", data.accessToken);
        localStorage.setItem("refreshToken", data.refreshToken);

        window.location.href = "/view/enterprises";
    });
</script>
</body>
</html>
