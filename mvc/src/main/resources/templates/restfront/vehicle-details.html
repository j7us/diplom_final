<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Детали машины</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        #map {
            height: 420px;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Детали машины</h1>
        <a id="backToVehiclesLink" class="btn btn-outline-secondary btn-sm" href="/view/enterprise-vehicles">Назад к машинам</a>
    </div>

    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
    <div id="infoMessage" class="alert alert-info d-none" role="alert"></div>

    <div class="card shadow-sm mb-3">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <tbody>
                <tr>
                    <th scope="row" class="w-25">ID</th>
                    <td id="vehicleIdValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Пробег</th>
                    <td id="vehicleMilleageValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Цена</th>
                    <td id="vehiclePriceValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Страна</th>
                    <td id="vehicleCountryValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Бренд</th>
                    <td id="vehicleBrandValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Активный водитель</th>
                    <td id="vehicleDriverValue">-</td>
                </tr>
                <tr>
                    <th scope="row">Дата выпуска</th>
                    <td id="vehicleProductionDateValue">-</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h2 class="h6 mb-3">Поездки</h2>
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-3">
                    <label class="form-label mb-1" for="dateFrom">Дата начала</label>
                    <input id="dateFrom" class="form-control form-control-sm" type="date">
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label mb-1" for="dateTo">Дата окончания</label>
                    <input id="dateTo" class="form-control form-control-sm" type="date">
                </div>
                <div class="col-12 col-md-6 d-flex gap-2">
                    <button id="loadTripsButton" class="btn btn-primary btn-sm" type="button">Загрузить поездки</button>
                    <button id="showRangeTrackButton" class="btn btn-outline-primary btn-sm" type="button">Показать все треки диапазона</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">ID поездки</th>
                        <th scope="col">Начало</th>
                        <th scope="col">Конец</th>
                        <th scope="col">Адрес начала</th>
                        <th scope="col">Адрес конца</th>
                        <th scope="col">Трек</th>
                    </tr>
                    </thead>
                    <tbody id="tripTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div id="map"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const errorMessage = document.getElementById("errorMessage");
    const infoMessage = document.getElementById("infoMessage");
    const tripTableBody = document.getElementById("tripTableBody");
    const loadTripsButton = document.getElementById("loadTripsButton");
    const showRangeTrackButton = document.getElementById("showRangeTrackButton");
    const dateFromInput = document.getElementById("dateFrom");
    const dateToInput = document.getElementById("dateTo");
    const backToVehiclesLink = document.getElementById("backToVehiclesLink");
    const vehicleIdValue = document.getElementById("vehicleIdValue");
    const vehicleMilleageValue = document.getElementById("vehicleMilleageValue");
    const vehiclePriceValue = document.getElementById("vehiclePriceValue");
    const vehicleCountryValue = document.getElementById("vehicleCountryValue");
    const vehicleBrandValue = document.getElementById("vehicleBrandValue");
    const vehicleDriverValue = document.getElementById("vehicleDriverValue");
    const vehicleProductionDateValue = document.getElementById("vehicleProductionDateValue");

    const params = new URLSearchParams(window.location.search);
    const vehicleId = params.get("vehicleId");
    const enterpriseId = params.get("enterpriseId");
    const page = params.get("page");
    const uuidPattern = /^[0-9a-fA-F-]{36}$/;

    let map = null;
    let trackLayer = null;
    let startMarker = null;
    let endMarker = null;

    const showError = (message) => {
        errorMessage.textContent = message;
        errorMessage.classList.remove("d-none");
    };

    const showInfo = (message) => {
        infoMessage.textContent = message;
        infoMessage.classList.remove("d-none");
    };

    const clearMessages = () => {
        errorMessage.textContent = "";
        errorMessage.classList.add("d-none");
        infoMessage.textContent = "";
        infoMessage.classList.add("d-none");
    };

    const getAccessToken = () => localStorage.getItem("accessToken");

    const setBackLink = () => {
        if (!enterpriseId) {
            backToVehiclesLink.href = "/view/enterprise-vehicles";
            return;
        }

        const url = new URL("/view/enterprise-vehicles", window.location.origin);
        url.searchParams.set("enterpriseId", enterpriseId);

        if (page !== null && page !== "") {
            url.searchParams.set("page", page);
        }

        backToVehiclesLink.href = url.pathname + url.search;
    };

    const formatDateTimeForDisplay = (value) => {
        if (!value) {
            return "-";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return "-";
        }

        return new Intl.DateTimeFormat("ru-RU", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        }).format(date);
    };

    const toIsoStartOfDay = (value) => {
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) {
            return null;
        }

        return date.toISOString();
    };

    const toIsoEndOfDay = (value) => {
        const date = new Date(value + "T23:59:59");
        if (Number.isNaN(date.getTime())) {
            return null;
        }

        return date.toISOString();
    };

    const getRange = () => {
        if (!dateFromInput.value || !dateToInput.value) {
            return null;
        }

        const dateFrom = toIsoStartOfDay(dateFromInput.value);
        const dateTo = toIsoEndOfDay(dateToInput.value);

        if (!dateFrom || !dateTo) {
            return null;
        }

        if (dateFrom > dateTo) {
            return null;
        }

        return {dateFrom: dateFrom, dateTo: dateTo};
    };

    const setDefaultDates = () => {
        const formatDateInputValue = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return year + "-" + month + "-" + day;
        };

        const now = new Date();
        const from = new Date(now.getFullYear(), now.getMonth(), 1);
        const to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        dateFromInput.value = formatDateInputValue(from);
        dateToInput.value = formatDateInputValue(to);
    };

    const initMap = () => {
        if (map) {
            return;
        }

        map = L.map("map").setView([55.751244, 37.618423], 11);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);
    };

    const clearMapLayers = () => {
        if (!map) {
            return;
        }

        if (trackLayer) {
            map.removeLayer(trackLayer);
            trackLayer = null;
        }

        if (startMarker) {
            map.removeLayer(startMarker);
            startMarker = null;
        }

        if (endMarker) {
            map.removeLayer(endMarker);
            endMarker = null;
        }
    };

    const readCoordinate = (point) => {
        if (!point) {
            return null;
        }

        if (Array.isArray(point.coordinates) && point.coordinates.length >= 2) {
            return {
                latitude: point.coordinates[1],
                longitude: point.coordinates[0]
            };
        }

        if (point.x !== undefined && point.y !== undefined) {
            return {
                latitude: point.y,
                longitude: point.x
            };
        }

        if (point.latitude !== undefined && point.longitude !== undefined) {
            return {
                latitude: point.latitude,
                longitude: point.longitude
            };
        }

        if (point.lat !== undefined && point.lng !== undefined) {
            return {
                latitude: point.lat,
                longitude: point.lng
            };
        }

        return null;
    };

    const toLatLng = (point) => {
        const coordinate = readCoordinate(point && point.location ? point.location : point);
        if (!coordinate) {
            return null;
        }

        return [coordinate.latitude, coordinate.longitude];
    };

    const drawTrack = (points) => {
        clearMapLayers();
        clearMessages();

        if (!Array.isArray(points) || points.length === 0) {
            showInfo("Нет точек для отображения трека.");
            return;
        }

        const sortedPoints = points.slice().sort((left, right) => String(left.date).localeCompare(String(right.date)));
        const latLngPoints = sortedPoints
            .map((point) => toLatLng(point))
            .filter((point) => Array.isArray(point));

        if (latLngPoints.length === 0) {
            showInfo("Сервер вернул точки без координат.");
            return;
        }

        trackLayer = L.polyline(latLngPoints, {
            color: "#0d6efd",
            weight: 4
        }).addTo(map);

        startMarker = L.marker(latLngPoints[0]).addTo(map).bindPopup("Начало трека");
        endMarker = L.marker(latLngPoints[latLngPoints.length - 1]).addTo(map).bindPopup("Конец трека");
        map.fitBounds(trackLayer.getBounds(), {padding: [20, 20]});
    };

    const createTripTrackButton = (trip) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "btn btn-outline-primary btn-sm";
        button.textContent = "Показать";
        button.addEventListener("click", () => loadTrackByRange(trip.startDate, trip.endDate));
        return button;
    };

    const renderTrips = (trips) => {
        tripTableBody.innerHTML = "";

        if (!Array.isArray(trips) || trips.length === 0) {
            showInfo("Поездки за выбранный диапазон не найдены.");
            return;
        }

        trips.forEach((trip) => {
            const row = document.createElement("tr");

            const idCell = document.createElement("td");
            idCell.textContent = trip.id || "-";

            const startDateCell = document.createElement("td");
            startDateCell.textContent = formatDateTimeForDisplay(trip.startDate);

            const endDateCell = document.createElement("td");
            endDateCell.textContent = formatDateTimeForDisplay(trip.endDate);

            const startAddressCell = document.createElement("td");
            startAddressCell.textContent = trip.startAddress || "-";

            const endAddressCell = document.createElement("td");
            endAddressCell.textContent = trip.endAddress || "-";

            const actionCell = document.createElement("td");
            actionCell.appendChild(createTripTrackButton(trip));

            row.appendChild(idCell);
            row.appendChild(startDateCell);
            row.appendChild(endDateCell);
            row.appendChild(startAddressCell);
            row.appendChild(endAddressCell);
            row.appendChild(actionCell);

            tripTableBody.appendChild(row);
        });
    };

    const getJson = async (url) => {
        const accessToken = getAccessToken();

        if (!accessToken) {
            throw new Error("Нет токена доступа. Войдите заново.");
        }

        const response = await fetch(url, {
            headers: {
                "Authorization": "Bearer " + accessToken
            }
        });

        if (!response.ok) {
            throw new Error("Ошибка запроса к серверу.");
        }

        return response.json();
    };

    const loadVehicle = async () => {
        const vehicle = await getJson("/api/vehicle/" + vehicleId + "/");

        vehicleIdValue.textContent = vehicle.id || "-";
        vehicleMilleageValue.textContent = vehicle.milleage ?? "-";
        vehiclePriceValue.textContent = vehicle.price ?? "-";
        vehicleCountryValue.textContent = vehicle.country || "-";
        vehicleBrandValue.textContent = vehicle.brandName || "-";
        vehicleDriverValue.textContent = vehicle.activeDriverName || "-";
        vehicleProductionDateValue.textContent = formatDateTimeForDisplay(vehicle.productionDate);
    };

    const loadTrips = async () => {
        clearMessages();

        const range = getRange();
        if (!range) {
            showError("Укажите корректный диапазон дат.");
            return;
        }

        try {
            const url = "/api/vehicles/" + vehicleId + "/trip-details?dateFrom=" + encodeURIComponent(range.dateFrom)
                + "&dateTo=" + encodeURIComponent(range.dateTo);
            const trips = await getJson(url);
            renderTrips(trips);
        } catch (error) {
            showError(error.message || "Не удалось получить поездки.");
        }
    };

    const loadTrackByRange = async (dateFrom, dateTo) => {
        clearMessages();

        if (!dateFrom || !dateTo) {
            showError("Не удалось определить диапазон поездки.");
            return;
        }

        try {
            const url = "/api/vehicles/" + vehicleId + "/trips?dateFrom=" + encodeURIComponent(dateFrom)
                + "&dateTo=" + encodeURIComponent(dateTo);
            const points = await getJson(url);
            drawTrack(points);
        } catch (error) {
            showError(error.message || "Не удалось получить трек поездки.");
        }
    };

    const onShowRangeTrack = () => {
        const range = getRange();
        if (!range) {
            showError("Укажите корректный диапазон дат.");
            return;
        }

        loadTrackByRange(range.dateFrom, range.dateTo);
    };

    const init = async () => {
        setBackLink();
        setDefaultDates();
        initMap();

        if (!vehicleId || !uuidPattern.test(vehicleId)) {
            showError("Не указан корректный идентификатор машины.");
            return;
        }

        try {
            await loadVehicle();
            await loadTrips();
        } catch (error) {
            showError(error.message || "Не удалось загрузить данные машины.");
        }
    };

    loadTripsButton.addEventListener("click", loadTrips);
    showRangeTrackButton.addEventListener("click", onShowRangeTrack);

    init();
</script>
</body>
</html>
