<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Предприятия менеджера</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Предприятия</h1>
        <a class="btn btn-sm btn-outline-primary" href="/view/reports">Отчеты</a>
    </div>

    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
    <div id="emptyMessage" class="alert alert-info d-none" role="alert">Нет предприятий для отображения.</div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Название</th>
                        <th scope="col">Страна</th>
                        <th scope="col">Производственная мощность</th>
                        <th scope="col">Часовой пояс</th>
                        <th scope="col">Машины</th>
                        <th scope="col">Действия</th>
                    </tr>
                    </thead>
                    <tbody id="enterpriseTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const errorMessage = document.getElementById("errorMessage");
    const emptyMessage = document.getElementById("emptyMessage");
    const tableBody = document.getElementById("enterpriseTableBody");

    const showError = (message) => {
        errorMessage.textContent = message;
        errorMessage.classList.remove("d-none");
    };

    const showEmpty = () => {
        emptyMessage.classList.remove("d-none");
    };

    const buildUpdatePayload = (enterprise, timeZone) => ({
        id: enterprise.id,
        name: enterprise.name,
        country: enterprise.country,
        productionCapacity: enterprise.productionCapacity,
        timeZone: timeZone
    });

    const updateEnterprise = async (enterprise, timeZoneInput, saveButton) => {
        const accessToken = localStorage.getItem("accessToken");

        if (!accessToken) {
            showError("Нет токена доступа. Войдите заново.");
            return;
        }

        const timeZone = timeZoneInput.value.trim();
        const payload = buildUpdatePayload(enterprise, timeZone);

        saveButton.disabled = true;

        const response = await fetch("/api/enterprises/" + enterprise.id + "/", {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + accessToken,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        saveButton.disabled = false;

        if (!response.ok) {
            showError("Не удалось обновить предприятие.");
            return;
        }

        const updatedEnterprise = await response.json();
        enterprise.timeZone = updatedEnterprise.timeZone;
        timeZoneInput.value = updatedEnterprise.timeZone || "";
    };

    const renderRow = (enterprise) => {
        const row = document.createElement("tr");

        const idCell = document.createElement("td");
        idCell.textContent = enterprise.id || "-";

        const nameCell = document.createElement("td");
        nameCell.textContent = enterprise.name || "-";

        const countryCell = document.createElement("td");
        countryCell.textContent = enterprise.country || "-";

        const capacityCell = document.createElement("td");
        capacityCell.textContent = enterprise.productionCapacity ?? "-";

        const timeZoneCell = document.createElement("td");
        const timeZoneInput = document.createElement("input");
        timeZoneInput.type = "text";
        timeZoneInput.className = "form-control form-control-sm";
        timeZoneInput.placeholder = "+03:00";
        timeZoneInput.value = enterprise.timeZone || "";
        timeZoneCell.appendChild(timeZoneInput);

        const vehiclesCell = document.createElement("td");

        if (enterprise.id) {
            const link = document.createElement("a");
            link.href = "/view/enterprise-vehicles?enterpriseId=" + enterprise.id;
            link.textContent = "Открыть";
            vehiclesCell.appendChild(link);
        } else {
            vehiclesCell.textContent = "-";
        }

        const actionsCell = document.createElement("td");
        const saveButton = document.createElement("button");
        saveButton.type = "button";
        saveButton.className = "btn btn-sm btn-primary";
        saveButton.textContent = "Сохранить";
        saveButton.addEventListener("click", () => updateEnterprise(enterprise, timeZoneInput, saveButton));
        actionsCell.appendChild(saveButton);

        if (!enterprise.id) {
            timeZoneInput.disabled = true;
            saveButton.disabled = true;
        }

        row.appendChild(idCell);
        row.appendChild(nameCell);
        row.appendChild(countryCell);
        row.appendChild(capacityCell);
        row.appendChild(timeZoneCell);
        row.appendChild(vehiclesCell);
        row.appendChild(actionsCell);

        tableBody.appendChild(row);
    };

    const loadEnterprises = async () => {
        const accessToken = localStorage.getItem("accessToken");

        if (!accessToken) {
            showError("Нет токена доступа. Войдите заново.");
            return;
        }

        const response = await fetch("/api/enterprises", {
            headers: {
                "Authorization": "Bearer " + accessToken
            }
        });

        if (!response.ok) {
            showError("Не удалось получить список предприятий.");
            return;
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
            showError("Некорректный ответ сервера.");
            return;
        }

        if (data.length === 0) {
            showEmpty();
            return;
        }

        data.forEach(renderRow);
    };

    loadEnterprises();
</script>
</body>
</html>
