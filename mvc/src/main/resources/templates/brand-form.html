<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Бренд</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 32px;
        }
        form {
            max-width: 520px;
        }
        label {
            display: block;
            margin-top: 12px;
        }
        input, button {
            margin-top: 6px;
            padding: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .actions {
            margin-top: 16px;
        }
    </style>
</head>
<body>
<h1 th:text="${title}">Бренд</h1>
<form th:action="${action}" th:object="${brand}" method="post">
    <label for="name">Название</label>
    <input id="name" type="text" th:field="*{name}">

    <label for="type">Тип</label>
    <input id="type" type="text" th:field="*{type}">

    <label for="capacity">Вместимость</label>
    <input id="capacity" type="number" th:field="*{capacity}">

    <label for="drive">Привод</label>
    <input id="drive" type="text" th:field="*{drive}">

    <label for="weight">Вес</label>
    <input id="weight" type="number" step="0.01" th:field="*{weight}">

    <div class="actions">
        <button type="submit" th:text="${submitLabel}">Сохранить</button>
    </div>
</form>
<div class="actions">
    <a th:href="@{/vehicles}">Назад</a>
</div>
</body>
</html>
